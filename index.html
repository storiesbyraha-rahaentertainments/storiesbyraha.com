<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stories by Raha — Coming Soon</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Jost:wght@200;300&family=Pinyon+Script&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Jost', sans-serif; font-weight: 300;
      overflow: hidden;
      background: #2c1f1a;
      color: #fdfcf9;
    }

    /* Animated background */
    .bg {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 120% 120% at 60% 40%, #e8c8b8 0%, #c9a898 20%, #a07060 45%, #5a3828 70%, #2c1f1a 100%);
    }
    .bg::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(44,31,26,0.5) 0%, rgba(44,31,26,0.85) 100%);
    }

    /* Bokeh */
    .bokeh { position: fixed; inset: 0; overflow: hidden; }
    .b {
      position: absolute; border-radius: 50%;
      background: rgba(253,252,249,0.1); filter: blur(50px);
      animation: bf linear infinite;
    }
    .b1 { width: 300px; height: 300px; top: -10%; left: 10%;  animation-duration: 20s; }
    .b2 { width: 200px; height: 200px; top: 60%; left: 70%;  animation-duration: 25s; animation-delay: -8s; }
    .b3 { width: 150px; height: 150px; top: 30%; left: 50%;  animation-duration: 18s; animation-delay: -4s; }
    @keyframes bf {
      0%,100% { transform: translateY(0) scale(1); opacity: 0.4; }
      50% { transform: translateY(-40px) scale(1.1); opacity: 0.7; }
    }

    .content {
      position: relative; z-index: 2;
      text-align: center;
      padding: 2rem;
      animation: fadeUp 1.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: #e8d8cc;
      opacity: 0.7;
      margin-bottom: 1.5rem;
      animation: fadeUp 1.5s 0.2s ease both;
    }

    .brand {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(4rem, 12vw, 8rem);
      color: #fdfcf9;
      line-height: 1;
      margin-bottom: 0.5rem;
      animation: fadeUp 1.5s 0.4s ease both;
    }

    .tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: #e8d8cc;
      opacity: 0.8;
      margin-bottom: 3rem;
      animation: fadeUp 1.5s 0.6s ease both;
    }

    /* Divider */
    .divider {
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; margin-bottom: 3rem;
      animation: fadeUp 1.5s 0.7s ease both;
    }
    .divider::before, .divider::after {
      content: ''; width: 60px; height: 1px;
      background: linear-gradient(to right, transparent, #c9a090);
    }
    .divider::after { background: linear-gradient(to left, transparent, #c9a090); }
    .divider span { color: #c9a090; font-size: 0.6rem; }

    .coming-soon {
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #c9a090;
      margin-bottom: 3rem;
      animation: fadeUp 1.5s 0.8s ease both;
    }

    /* Countdown */
    .countdown {
      display: flex; gap: 2rem; justify-content: center;
      margin-bottom: 3.5rem;
      animation: fadeUp 1.5s 0.9s ease both;
    }
    .count-item { text-align: center; }
    .count-num {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: #fdfcf9;
      line-height: 1;
      display: block;
    }
    .count-label {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #c9a090;
      opacity: 0.7;
      margin-top: 0.3rem;
    }
    .count-sep {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 2.5rem;
      color: #c9a090;
      opacity: 0.4;
      align-self: flex-start;
      padding-top: 0.1rem;
    }

    /* Email signup */
    .notify-text {
      font-size: 0.8rem;
      opacity: 0.6;
      margin-bottom: 1.2rem;
      letter-spacing: 0.05em;
      animation: fadeUp 1.5s 1s ease both;
    }
    .notify-form {
      display: flex; gap: 0;
      max-width: 400px; margin: 0 auto 3rem;
      animation: fadeUp 1.5s 1.1s ease both;
    }
    .notify-form input {
      flex: 1;
      background: rgba(253,252,249,0.08);
      border: 1px solid rgba(201,160,144,0.3);
      border-right: none;
      padding: 0.85rem 1.2rem;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.8rem;
      color: #fdfcf9;
      outline: none;
    }
    .notify-form input::placeholder { color: rgba(253,252,249,0.3); }
    .notify-form input:focus { border-color: rgba(201,160,144,0.6); }
    .notify-form button {
      background: #c9a090;
      border: 1px solid #c9a090;
      color: #2c1f1a;
      padding: 0.85rem 1.5rem;
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.3s;
      white-space: nowrap;
    }
    .notify-form button:hover { background: #e8d8cc; }

    /* Social */
    .socials {
      display: flex; gap: 1.5rem; justify-content: center;
      animation: fadeUp 1.5s 1.2s ease both;
    }
    .socials a {
      font-size: 0.6rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(253,252,249,0.35);
      text-decoration: none;
      transition: color 0.3s;
    }
    .socials a:hover { color: #c9a090; }

    /* Bottom */
    .bottom-tag {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: rgba(253,252,249,0.2);
      text-transform: uppercase;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="bokeh"><div class="b b1"></div><div class="b b2"></div><div class="b b3"></div></div>

  <div class="content">
    <p class="eyebrow">Wedding Photography</p>
    <div class="brand">Stories by Raha</div>
    <p class="tagline">Something beautiful is coming</p>

    <div class="divider"><span>✦</span></div>

    <p class="coming-soon">We are coming soon</p>

    <div class="countdown">
      <div class="count-item">
        <span class="count-num" id="days">00</span>
        <span class="count-label">Days</span>
      </div>
      <span class="count-sep">:</span>
      <div class="count-item">
        <span class="count-num" id="hours">00</span>
        <span class="count-label">Hours</span>
      </div>
      <span class="count-sep">:</span>
      <div class="count-item">
        <span class="count-num" id="mins">00</span>
        <span class="count-label">Minutes</span>
      </div>
      <span class="count-sep">:</span>
      <div class="count-item">
        <span class="count-num" id="secs">00</span>
        <span class="count-label">Seconds</span>
      </div>
    </div>

    <p class="notify-text">Be the first to know when we launch</p>
    <div class="notify-form">
      <input type="email" placeholder="your@email.com"/>
      <button>Notify Me</button>
    </div>

    <div class="socials">
      <a href="#">Instagram</a>
      <a href="#">Facebook</a>
      <a href="#">hello@storiesbyraha.com</a>
    </div>
  </div>

  <p class="bottom-tag">© 2026 Stories by Raha</p>

  <script>
    // Set launch date — change this to your real launch date
    const launch = new Date('2026-06-01T00:00:00');

    function update() {
      const now = new Date();
      const diff = launch - now;
      if (diff <= 0) return;
      const d = Math.floor(diff / 86400000);
      const h = Math.floor((diff % 86400000) / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      const s = Math.floor((diff % 60000) / 1000);
      document.getElementById('days').textContent  = String(d).padStart(2,'0');
      document.getElementById('hours').textContent = String(h).padStart(2,'0');
      document.getElementById('mins').textContent  = String(m).padStart(2,'0');
      document.getElementById('secs').textContent  = String(s).padStart(2,'0');
    }
    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
